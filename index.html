// ============ RENDER ============
let current = 0;

function renderNav() {
  const nav = document.getElementById('slideNav');
  let lastSection = '';
  let html = '';
  SLIDES.forEach((s, i) => {
    if (s.section !== lastSection) {
      html += `<div class="text-[10px] text-ink/40 font-bold tracking-widest mt-3 mb-1 px-2">${s.section.toUpperCase()}</div>`;
      lastSection = s.section;
    }
    html += `<div class="slide-item rounded px-3 py-2 ${i===current?'active':''}" data-idx="${i}">
      <span class="font-mono text-xs opacity-70 mr-2">${s.id}</span>${s.title.replace(/｜.*$/,'')}
    </div>`;
  });
  nav.innerHTML = html;
  nav.querySelectorAll('.slide-item').forEach(el => {
    el.addEventListener('click', () => goTo(parseInt(el.dataset.idx)));
  });
}

function renderSlide() {
  const s = SLIDES[current];
  const pillCls = SECTION_PILL[s.section] || 'pill-序';
  document.getElementById('stage').innerHTML = `
    <div class="flex items-center gap-3 text-xs mb-4">
      <span class="font-mono text-ink/50">${String(current).padStart(2,'0')} / 30</span>
      <span class="opacity-30">·</span>
      <span class="tag ${pillCls}">${s.section}</span>
      ${s.subtitle ? `<span class="text-ink/50">${s.subtitle}</span>` : ''}
    </div>
    <h2 class="serif text-3xl md:text-4xl font-bold title-bar mb-6">${s.title}</h2>
    <div class="mb-6 rounded-xl overflow-hidden border border-amber-900/10 bg-navy/5" id="heroImgWrap">
      <img src="slides/${s.id}.png" alt="${s.title}"
           class="w-full h-auto block"
           onerror="document.getElementById('heroImgWrap').style.display='none'">
    </div>
    <div>${s.body}</div>
  `;
  document.getElementById('bottomNote').innerHTML = `
    <div class="text-xs font-bold text-gold tracking-wider mb-2">💡 教學者註解</div>
    <p class="text-sm leading-relaxed text-ink/85">${s.bottom}</p>
  `;
  document.getElementById('studentView').innerHTML = `<p>${s.student}</p>`;
  document.getElementById('extensions').innerHTML = s.ext.map(e =>
    `<a href="${e.u}" target="_blank" rel="noopener" class="ext-link">${e.t}</a>`
  ).join('');
  document.getElementById('slidePos').textContent = `${current+1} / ${SLIDES.length}`;
  document.querySelectorAll('.slide-item').forEach((el,i) => {
    el.classList.toggle('active', i===current);
  });
  loadNote();
  window.scrollTo({top:0, behavior:'smooth'});
}

function goTo(i) {
  saveNote();
  current = Math.max(0, Math.min(SLIDES.length-1, i));
  renderSlide();
  if (typeof updateHud === 'function') updateHud();
}
function nextSlide(){ goTo(current+1); }
function prevSlide(){ goTo(current-1); }

// note storage
function loadNote() {
  const k = 'aipack-note-' + SLIDES[current].id;
  document.getElementById('noteBox').value = localStorage.getItem(k) || '';
}
function saveNote() {
  const k = 'aipack-note-' + SLIDES[current].id;
  localStorage.setItem(k, document.getElementById('noteBox').value);
}
document.addEventListener('DOMContentLoaded', () => {
  renderNav();
  renderSlide();
  // keyboard
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'TEXTAREA') {
      if ((e.metaKey||e.ctrlKey) && e.key==='s') { e.preventDefault(); saveNote(); }
      return;
    }
    if (e.key==='ArrowRight' || e.key===' ') { e.preventDefault(); nextSlide(); }
    if (e.key==='ArrowLeft') { e.preventDefault(); prevSlide(); }
  });
});

function presentMode() {
  const isOn = document.body.classList.contains('presenting');
  if (isOn) exitPresent();
  else enterPresent();
}
function enterPresent() {
  document.body.classList.add('presenting');
  // 隱藏右側補充欄
  document.querySelectorAll('main > aside, main > div.right-panel, main > .right-panel').forEach(el => el.classList.add('hidden-by-present'));
  // 加 HUD
  if (!document.getElementById('presentHud')) {
    const hud = document.createElement('div');
    hud.id = 'presentHud';
    hud.className = 'present-hud';
    document.body.appendChild(hud);
    const hint = document.createElement('div');
    hint.className = 'present-hint';
    hint.textContent = '← → 翻頁　ESC 離開';
    hint.id = 'presentHint';
    document.body.appendChild(hint);
  }
  updateHud();
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
}
function exitPresent() {
  document.body.classList.remove('presenting');
  document.querySelectorAll('.hidden-by-present').forEach(el => el.classList.remove('hidden-by-present'));
  const h = document.getElementById('presentHud'); if (h) h.remove();
  const t = document.getElementById('presentHint'); if (t) t.remove();
  if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
}
function updateHud() {
  const h = document.getElementById('presentHud');
  if (h) h.textContent = `${current+1} / ${SLIDES.length}　·　${SLIDES[current].section}`;
}
// 翻頁時更新 HUD
const _origGoTo = window.goTo;
document.addEventListener('keyup', e => {
  if (e.key === 'Escape' && document.body.classList.contains('presenting')) exitPresent();
});
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && document.body.classList.contains('presenting')) exitPresent();
});

    <div>
      <div class="serif text-xl font-bold text-rust">一條龍閱讀模式</div>
      <div class="text-xs text-ink/60">完整 ${SLIDES.length} 張內容串接閱讀 · 含教學者註解、學員視角與延伸教材</div>
    </div>
    <button onclick="exitLongform()">← 回三欄式</button>
  </div>`;

  let lastSection = '';
  SLIDES.forEach(s => {
    if (s.section !== lastSection) {
      html += `<h2 class="lf-section-header">${s.section}</h2>`;
      const intro = SECTION_INTRO[s.section];
      if (intro) html += `<p class="lf-section-intro">${intro}</p>`;
      lastSection = s.section;
    }
    const extLinks = (s.ext || []).map(e =>
      `<a href="${e.u}" target="_blank" rel="noopener">${e.t}</a>`
    ).join('');
    html += `<article id="lf-${s.id}">
      <div class="lf-meta">${String(s.id).padStart(2,'0')}　·　${s.section}</div>
      <h3 class="lf-title">${s.title}</h3>
      ${s.subtitle ? `<div class="lf-subtitle">${s.subtitle}</div>` : ''}
      <div class="lf-hero"><img src="slides/${s.id}.png" alt="${s.title}" onerror="this.parentElement.style.display='none'"></div>
      <div class="lf-body">${s.body}</div>
      ${s.bottom ? `<div class="lf-note">
        <div class="lf-note-label">💡 教學者註解</div>
        <p>${s.bottom}</p>
      </div>` : ''}
      ${s.student ? `<div class="lf-student">
        <div class="lf-student-label">📌 本頁重點（學員視角）</div>
        <p>${s.student}</p>
      </div>` : ''}
      ${extLinks ? `<div class="lf-ext">
        <div class="lf-ext-label">📚 延伸教材</div>
        ${extLinks}
      </div>` : ''}
    </article>`;
  });
  v.innerHTML = html;
}

function longformMode() {
  if (!document.getElementById('longformView').children.length) renderLongform();
  document.body.classList.add('longform');
  window.scrollTo({top: 0});
}
function exitLongform() {
  document.body.classList.remove('longform');
  window.scrollTo({top: 0});
}
document.addEventListener('keyup', e => {
  if (e.key === 'Escape' && document.body.classList.contains('longform')) exitLongform();
});
</script>

</body>
</html>
